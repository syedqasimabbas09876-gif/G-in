<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indus Botanical | Official Export Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000000; }
.sharp-card { border: 2px solid #000000; box-shadow: 10px 10px 0px #8F9E8B; transition: 0.2s; }
.sharp-card:hover { transform: translate(-5px, -5px); box-shadow: 15px 15px 0px #000000; }
.btn-black { background: #000000; color: #ffffff; border: 2px solid #000000; transition: 0.2s; }
.btn-black:hover { background: #ffffff; color: #000000; }
input, select, textarea { border: 2px solid #eeeeee !important; padding: 12px; border-radius: 8px; }
input:focus { border-color: #000000 !important; outline: none; }
</style>
</head>
<body class="p-4 md:p-10">

<nav class="flex justify-between items-center mb-20 border-b-4 border-black pb-6">
<div>
<h1 class="text-4xl font-black uppercase tracking-tighter">Indus Botanical</h1>
<p class="text-xs font-bold text-gray-500 tracking-[0.3em]">EST. 2024 | LAHORE, PAKISTAN</p>
</div>
<div class="hidden md:flex gap-6 font-bold text-sm uppercase">
<a href="https://instagram.com/Indus_botanical" target="_blank" class="hover:underline">Instagram</a>
<a href="https://wa.me/923299718034" target="_blank" class="text-green-600">WhatsApp</a>
</div>
</nav>

<div class="max-w-4xl mb-32">
<h2 class="text-6xl md:text-8xl font-black uppercase leading-none mb-10">Direct <br>Export <br><span class="text-[#8F9E8B]">Solutions.</span></h2>
<div class="relative max-w-lg">
<label class="block text-xs font-black mb-2">CHECK INTERNATIONAL SHIPPING AVAILABILITY:</label>
<input type="text" id="locSearch" onkeyup="filterLocations()" placeholder="USA, UK, UAE, GERMANY..." class="w-full text-lg font-bold">
<div id="locDrop" class="hidden absolute w-full bg-white border-2 border-black mt-2 z-50"></div>
</div>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-10 mb-32">

<div class="sharp-card p-6 bg-white">
<img src="https://images.unsplash.com/photo-1596040033229-a9821ebd058d?w=500" class="w-full h-64 object-cover border-2 border-black mb-6">
<h3 class="text-2xl font-black mb-2 uppercase">Moringa Powder</h3>
<p class="text-sm font-bold text-gray-400 mb-6 uppercase tracking-widest">$15.00 PER KG</p>
<div class="bg-gray-100 p-4 border-2 border-dashed border-gray-300">
<input type="number" id="qty1" oninput="calc(1, 15)" placeholder="ENTER KG" class="w-full font-black text-2xl mb-2">
<p class="text-xs font-bold">TOTAL ESTIMATE: <span class="text-xl text-green-700 ml-2">$ <span id="tot1">0.00</span></span></p>
</div>
</div>

<div class="sharp-card p-6 bg-white">
<img src="https://images.unsplash.com/photo-1615485290382-441e4d049cb5?w=500" class="w-full h-64 object-cover border-2 border-black mb-6">
<h3 class="text-2xl font-black mb-2 uppercase">Neem Core</h3>
<p class="text-sm font-bold text-gray-400 mb-6 uppercase tracking-widest">$12.00 PER KG</p>
<div class="bg-gray-100 p-4 border-2 border-dashed border-gray-300">
<input type="number" id="qty2" oninput="calc(2, 12)" placeholder="ENTER KG" class="w-full font-black text-2xl mb-2">
<p class="text-xs font-bold">TOTAL ESTIMATE: <span class="text-xl text-green-700 ml-2">$ <span id="tot2">0.00</span></span></p>
</div>
</div>

<div class="sharp-card p-6 bg-white">
<img src="https://images.unsplash.com/photo-1515377905703-c4788e51af15?w=500" class="w-full h-64 object-cover border-2 border-black mb-6">
<h3 class="text-2xl font-black mb-2 uppercase">Rosemary</h3>
<p class="text-sm font-bold text-gray-400 mb-6 uppercase tracking-widest">$18.00 PER KG</p>
<div class="bg-gray-100 p-4 border-2 border-dashed border-gray-300">
<input type="number" id="qty3" oninput="calc(3, 18)" placeholder="ENTER KG" class="w-full font-black text-2xl mb-2">
<p class="text-xs font-bold">TOTAL ESTIMATE: <span class="text-xl text-green-700 ml-2">$ <span id="tot3">0.00</span></span></p>
</div>
</div>

</div>

<div class="max-w-2xl mx-auto border-4 border-black p-10 mb-20 bg-[#F9F9F9]">
<h2 class="text-4xl font-black uppercase mb-10">Request Bulk Quote</h2>
<form action="https://formspree.io/f/YOUR_ID_HERE" method="POST" class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<input type="text" name="name" placeholder="FULL NAME" required class="w-full font-bold">
<input type="email" name="email" placeholder="BUSINESS EMAIL" required class="w-full font-bold">
</div>
<textarea name="address" placeholder="SHIPPING ADDRESS & PORT DETAILS" required rows="5" class="w-full font-bold"></textarea>
<button type="submit" class="w-full btn-black py-6 text-xl font-black uppercase tracking-widest">Send Inquiry Now</button>
</form>
</div>

<div class="fixed bottom-6 left-6 z-50">
<div id="ai-box" class="hidden bg-white border-4 border-black p-6 mb-4 w-72 shadow-[10px_10px_0px_#000]">
<p class="text-xs font-black mb-4 underline">QUICK ANSWERS:</p>
<button onclick="alert('Pricing: $12-$18/KG')" class="block w-full text-left text-xs font-bold mb-2 hover:text-green-700">➜ BULK PRICES?</button>
<button onclick="alert('Delivery: USA, UK, UAE, EU Ports')" class="block w-full text-left text-xs font-bold hover:text-green-700">➜ SHIPPING AREAS?</button>
</div>
<button onclick="document.getElementById('ai-box').classList.toggle('hidden')" class="btn-black px-6 py-3 font-black uppercase text-xs shadow-[5px_5px_0px_#8F9E8B]">Help Center</button>
</div>

<script>
function calc(id, p) {
const q = document.getElementById('qty'+id).value;
document.getElementById('tot'+id).innerText = (q*p).toFixed(2);
}

const locs = ["USA (ILLINOIS)", "USA (TEXAS)", "UK (LONDON)", "UAE (DUBAI)", "GERMANY"];
function filterLocations() {
const input = document.getElementById('locSearch').value.toUpperCase();
const drop = document.getElementById('locDrop');
drop.innerHTML = '';
if(input) {
drop.classList.remove('hidden');
locs.filter(l => l.includes(input)).forEach(l => {
const d = document.createElement('div');
d.className = "p-3 border-b-2 border-black hover:bg-black hover:text-white cursor-pointer font-bold text-xs";
d.innerText = l;
d.onclick = () => { document.getElementById('locSearch').value = l; drop.classList.add('hidden'); };
drop.appendChild(d);
});
} else { drop.classList.add('hidden'); }
}
</script>
</body>
</html>
